<!DOCTYPE html>
<html>
<head><title>New Reservation</title></head>
<body>
<h1>New Reservation</h1>
<form method="post" action="{% url 'process-reservation' %}">
  {% csrf_token %}
  <p><label>Name: <input type="text" name="customer_name" required></label></p>
  <p><label>Guests: <input type="number" name="num_guests" min="1" required></label></p>
  <p><label>Date/Time: <input type="datetime-local" name="reservation_time" required></label></p>
  <button type="submit">Submit</button>
</form>
<a href="{% url 'home' %}">Home</a>
</body>
</html>
